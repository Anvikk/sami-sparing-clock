<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sami Sparring Clock</title>
<style>
  :root {
    --bg: #111418;
    --panel: #1b1f26;
    --active: #2ba84a;
    --active-glow: #2ba84a55;
    --inactive: #262b33;
    --text: #f2f2f2;
    --dim: #8a8f98;
    --accent: #4a9eff;
    --danger: #e04b4b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none; user-select: none;
  }
  #app { height: 100%; display: flex; flex-direction: column; }

  .screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; gap: 16px; }
  .screen h1 { font-size: 22px; margin: 0 0 8px; text-align: center; }
  .screen p.sub { color: var(--dim); margin: -8px 0 8px; text-align: center; font-size: 14px; }
  .card { background: var(--panel); border-radius: 16px; padding: 20px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 14px; }
  label { font-size: 13px; color: var(--dim); }
  input {
    width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333a45;
    background: #0f1216; color: var(--text); font-size: 16px; margin-top: 4px;
  }
  button {
    padding: 14px; border-radius: 10px; border: none; font-size: 16px; font-weight: 600;
    cursor: pointer; background: var(--accent); color: #fff;
  }
  button.secondary { background: var(--inactive); color: var(--text); }
  button.ghost { background: transparent; border: 1px solid #333a45; color: var(--dim); }
  .rolepick { display: flex; flex-direction: column; gap: 10px; }
  .rolepick button { padding: 16px; }
  .roomcode { font-size: 30px; letter-spacing: 5px; text-align: center; font-weight: 700; background: #0f1216; padding: 14px; border-radius: 10px; }
  .hint { font-size: 12px; color: var(--dim); text-align: center; }
  .linkbox { background: #0f1216; border-radius: 10px; padding: 10px; font-size: 12px; word-break: break-all; color: var(--dim); }

  /* ---------- Clock screen: side by side, horizontal, no rotation ---------- */
  #clockScreen { display: none; flex: 1; flex-direction: column; }
  .topbar { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 10px; background: #0f1216; font-size: 12px; color: var(--dim); }
  .topbar button { padding: 8px 14px; font-size: 13px; }
  .clockwrap { flex: 1; display: flex; flex-direction: row; }
  .clockhalf {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--inactive); transition: background 0.15s;
  }
  .clockhalf.active { background: var(--active); box-shadow: inset 0 0 60px var(--active-glow); }
  .clockhalf.flagged { background: var(--danger); }
  .clockhalf .name { font-size: 16px; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 700; }
  .clockhalf .time { font-size: 13vw; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
  .clockhalf .badge { font-size: 12px; margin-top: 10px; color: rgba(255,255,255,0.8); text-align: center; padding: 0 10px; }
  .divider { width: 2px; background: #0f1216; }
  .spectatorNote { text-align: center; font-size: 12px; color: var(--dim); padding: 6px; background: #0f1216; }
</style>
</head>
<body>
<div id="app">

  <!-- SETUP SCREEN -->
  <div id="setupScreen" class="screen">
    <h1>♟ Sami Sparring Clock</h1>
    <p class="sub">Create a room and send the link. Sami is always on the right, opponent on the left.</p>
    <div class="card">
      <div>
        <label>Minutes per side</label>
        <input id="baseMinutes" type="number" value="15" min="1" max="180">
      </div>
      <div>
        <label>Increment (seconds per move)</label>
        <input id="incSeconds" type="number" value="10" min="0" max="60">
      </div>
      <button id="createBtn">Create Room</button>
    </div>
    <div class="card">
      <label>Or join with a code</label>
      <input id="joinCode" type="text" placeholder="Room code" maxlength="5" style="text-transform:uppercase">
      <button id="joinBtn" class="secondary">Join Room</button>
    </div>
  </div>

  <!-- ROOM CREATED / SHARE SCREEN -->
  <div id="shareScreen" class="screen" style="display:none;">
    <h1>Room Created</h1>
    <div class="card">
      <div class="roomcode" id="roomCodeLabel"></div>
      <button id="copyLinkBtn">Copy Link to Send</button>
      <div class="linkbox" id="linkPreview"></div>
      <p class="hint">Send this link over WhatsApp — whoever opens it just taps their role, no typing needed.</p>
      <button id="continueBtn" class="secondary">Continue to Role Select</button>
    </div>
  </div>

  <!-- ROLE PICK SCREEN -->
  <div id="roleScreen" class="screen" style="display:none;">
    <h1>Who are you?</h1>
    <div class="card rolepick">
      <button id="pickSami">I'm Sami (right side)</button>
      <button id="pickOpponent" class="secondary">I'm the Opponent (left side)</button>
      <button id="pickSpectate" class="ghost">Just Watching / Coaching</button>
    </div>
  </div>

  <!-- CLOCK SCREEN -->
  <div id="clockScreen">
    <div class="topbar">
      <span>Room <b id="roomCodeSmall"></b></span>
      <button id="pauseBtn" class="ghost">Pause/Resume</button>
      <button id="resetBtn" class="ghost">Reset</button>
    </div>
    <div class="clockwrap">
      <div class="clockhalf" id="opponentHalf">
        <div class="name">OPPONENT</div>
        <div class="time" id="opponentTime">15:00</div>
        <div class="badge" id="opponentBadge"></div>
      </div>
      <div class="divider"></div>
      <div class="clockhalf" id="samiHalf">
        <div class="name">SAMI</div>
        <div class="time" id="samiTime">15:00</div>
        <div class="badge" id="samiBadge"></div>
      </div>
    </div>
    <div class="spectatorNote" id="spectatorNote" style="display:none;">Spectator view — read only</div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyB6KHm6FFSqhhJmtjE5RMMuUSfTikyzSF8",
  authDomain: "sami-sparing-clock.firebaseapp.com",
  databaseURL: "https://sami-sparing-clock-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sami-sparing-clock",
  storageBucket: "sami-sparing-clock.firebasestorage.app",
  messagingSenderId: "1015963269728",
  appId: "1:1015963269728:web:3968cdbe8ecfc0d2b92105"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomId = null;
let myRole = null; // 'sami' | 'opponent' | null (spectator)
let roomRef = null;
let serverOffset = 0;
let gameState = null;
let tickHandle = null;
let audioCtx = null;

function fmt(ms) {
  if (ms < 0) ms = 0;
  const totalSec = Math.floor(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  const tenths = Math.floor((ms % 1000) / 100);
  if (totalSec < 20) return `${m}:${String(s).padStart(2,'0')}.${tenths}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let out = '';
  for (let i = 0; i < 5; i++) out += chars[Math.floor(Math.random() * chars.length)];
  return out;
}

function beep(freq = 880, dur = 120) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = freq;
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    o.start();
    o.stop(audioCtx.currentTime + dur / 1000);
  } catch (e) {}
}

db.ref('.info/serverTimeOffset').on('value', snap => { serverOffset = snap.val() || 0; });
function nowServer() { return Date.now() + serverOffset; }

const setupScreen = document.getElementById('setupScreen');
const shareScreen = document.getElementById('shareScreen');
const roleScreen = document.getElementById('roleScreen');
const clockScreen = document.getElementById('clockScreen');

function showScreen(el) {
  [setupScreen, shareScreen, roleScreen].forEach(s => s.style.display = 'none');
  clockScreen.style.display = 'none';
  el.style.display = 'flex';
}

// ---------- Create room ----------
document.getElementById('createBtn').onclick = async () => {
  const baseMin = parseFloat(document.getElementById('baseMinutes').value) || 15;
  const incSec = parseFloat(document.getElementById('incSeconds').value) || 0;
  const code = genRoomCode();
  const baseMs = baseMin * 60 * 1000;
  const incMs = incSec * 1000;

  roomId = code;
  roomRef = db.ref('clockRooms/' + roomId);
  await roomRef.set({
    baseTime: baseMs,
    increment: incMs,
    samiTime: baseMs,
    opponentTime: baseMs,
    turn: 'sami',
    turnStartedAt: null,
    running: false,
    flagged: null,
    createdAt: firebase.database.ServerValue.TIMESTAMP
  });

  document.getElementById('roomCodeLabel').textContent = roomId;
  const link = location.origin + location.pathname + '?room=' + roomId;
  document.getElementById('linkPreview').textContent = link;
  showScreen(shareScreen);
};

document.getElementById('copyLinkBtn').onclick = () => {
  const link = location.origin + location.pathname + '?room=' + roomId;
  navigator.clipboard.writeText(link).then(() => {
    document.getElementById('copyLinkBtn').textContent = 'Copied!';
    setTimeout(() => document.getElementById('copyLinkBtn').textContent = 'Copy Link to Send', 1500);
  }).catch(() => alert(link));
};

document.getElementById('continueBtn').onclick = () => showScreen(roleScreen);

// ---------- Join room ----------
document.getElementById('joinBtn').onclick = () => {
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  if (!code) return;
  joinRoomByCode(code);
};

function joinRoomByCode(code) {
  roomId = code;
  roomRef = db.ref('clockRooms/' + roomId);
  roomRef.get().then(snap => {
    if (!snap.exists()) {
      alert('Room not found. Check the code or link.');
      return;
    }
    showScreen(roleScreen);
  });
}

// auto-join if opened via shared link
(function checkUrlParam() {
  const params = new URLSearchParams(location.search);
  const roomParam = params.get('room');
  if (roomParam) joinRoomByCode(roomParam.toUpperCase());
})();

// ---------- Role pick ----------
document.getElementById('pickSami').onclick = () => { myRole = 'sami'; enterClock(); };
document.getElementById('pickOpponent').onclick = () => { myRole = 'opponent'; enterClock(); };
document.getElementById('pickSpectate').onclick = () => { myRole = null; enterClock(); };

function enterClock() {
  document.getElementById('roomCodeSmall').textContent = roomId;
  document.getElementById('spectatorNote').style.display = myRole ? 'none' : 'block';
  showScreen(clockScreen);
  attachRoomListener();
  startTicker();
}

function attachRoomListener() {
  roomRef.on('value', snap => {
    gameState = snap.val();
    render();
  });
}

document.getElementById('opponentHalf').onclick = () => handleTap('opponent');
document.getElementById('samiHalf').onclick = () => handleTap('sami');

function handleTap(role) {
  if (!gameState || !myRole) return;
  if (myRole !== role) return;
  if (gameState.flagged) return;
  if (gameState.turn !== role) return;

  const now = nowServer();
  const started = gameState.turnStartedAt || now;
  const elapsed = !gameState.turnStartedAt ? 0 : (now - started);
  const frozenKey = role + 'Time';
  let newTime = gameState[frozenKey] - elapsed + gameState.increment;
  const nextTurn = role === 'sami' ? 'opponent' : 'sami';

  if (newTime <= 0) {
    roomRef.update({ [frozenKey]: 0, running: false, flagged: role });
    return;
  }

  roomRef.update({
    [frozenKey]: newTime,
    turn: nextTurn,
    turnStartedAt: firebase.database.ServerValue.TIMESTAMP,
    running: true
  });
}

document.getElementById('pauseBtn').onclick = () => {
  if (!gameState) return;
  if (gameState.running) {
    const now = nowServer();
    const started = gameState.turnStartedAt || now;
    const elapsed = now - started;
    const key = gameState.turn + 'Time';
    const remaining = Math.max(0, gameState[key] - elapsed);
    roomRef.update({ [key]: remaining, running: false, turnStartedAt: null });
  } else {
    roomRef.update({ running: true, turnStartedAt: firebase.database.ServerValue.TIMESTAMP });
  }
};

document.getElementById('resetBtn').onclick = () => {
  if (!gameState) return;
  if (!confirm('Reset the clock for both sides?')) return;
  roomRef.update({
    samiTime: gameState.baseTime,
    opponentTime: gameState.baseTime,
    turn: 'sami',
    turnStartedAt: null,
    running: false,
    flagged: null
  });
};

function startTicker() {
  if (tickHandle) return;
  tickHandle = setInterval(render, 100);
}

let lastLowBeepSami = false, lastLowBeepOpp = false;

function render() {
  if (!gameState) return;
  const now = nowServer();
  let samiRemaining = gameState.samiTime;
  let oppRemaining = gameState.opponentTime;

  if (gameState.running && gameState.turnStartedAt) {
    const elapsed = now - gameState.turnStartedAt;
    if (gameState.turn === 'sami') samiRemaining = gameState.samiTime - elapsed;
    else oppRemaining = gameState.opponentTime - elapsed;
  }

  samiRemaining = Math.max(0, samiRemaining);
  oppRemaining = Math.max(0, oppRemaining);

  document.getElementById('samiTime').textContent = fmt(samiRemaining);
  document.getElementById('opponentTime').textContent = fmt(oppRemaining);

  const samiHalf = document.getElementById('samiHalf');
  const oppHalf = document.getElementById('opponentHalf');
  samiHalf.classList.toggle('active', gameState.running && gameState.turn === 'sami' && !gameState.flagged);
  oppHalf.classList.toggle('active', gameState.running && gameState.turn === 'opponent' && !gameState.flagged);
  samiHalf.classList.toggle('flagged', gameState.flagged === 'sami');
  oppHalf.classList.toggle('flagged', gameState.flagged === 'opponent');

  document.getElementById('samiBadge').textContent = gameState.flagged === 'sami' ? 'FLAGGED — TIME OUT' : (myRole === 'sami' ? 'Tap after you move' : '');
  document.getElementById('opponentBadge').textContent = gameState.flagged === 'opponent' ? 'FLAGGED — TIME OUT' : (myRole === 'opponent' ? 'Tap after you move' : '');

  if (gameState.running) {
    if (samiRemaining < 10000 && samiRemaining > 0 && !lastLowBeepSami) { beep(660); lastLowBeepSami = true; }
    if (samiRemaining >= 10000) lastLowBeepSami = false;
    if (oppRemaining < 10000 && oppRemaining > 0 && !lastLowBeepOpp) { beep(660); lastLowBeepOpp = true; }
    if (oppRemaining >= 10000) lastLowBeepOpp = false;
  }
  if (gameState.flagged) beep(220, 400);
}
</script>
</body>
</html>
